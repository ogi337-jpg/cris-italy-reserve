<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>예약 상세</title>
    <style>
        body { margin: 0; background: #f2f2f2; font-family: -apple-system, sans-serif; color: #191919; padding-bottom: 120px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }

        /* 헤더 */
        .header { padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 100; }
        .header-title { flex: 1; text-align: center; font-weight: bold; font-size: 16px; margin-right: 30px; }
        
        /* [핵심 수정] 이미지 잘림 방지 설정 */
        .top-img-container { width: 100%; background: #f9f9f9; text-align: center; }
        .top-img { width: 100%; height: auto; max-height: 450px; object-fit: contain; display: block; }

        .store-info { padding: 22px 18px; border-bottom: 1px solid #f2f2f2; }
        .store-info h2 { margin: 0; font-size: 21px; }

        /* 메뉴 리스트 (삿뽀로 스타일) */
        .menu-list-section { padding: 18px; background-color: #f8f8f8; }
        .menu-card { display: flex; background: #fff; border-radius: 12px; margin-bottom: 12px; padding: 15px; gap: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); align-items: center; }
        .menu-card-img { width: 90px; height: 90px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
        .menu-content { flex: 1; }
        .menu-title { font-size: 15px; font-weight: bold; margin-bottom: 6px; color: #191919; }
        .menu-desc { font-size: 12px; color: #666; line-height: 1.4; white-space: pre-line; margin-bottom: 10px; }
        .btn-select-menu { background: #fee500; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; float: right; }

        /* 예약 단계 설정 */
        .section { padding: 22px 18px; border-bottom: 8px solid #f8f8f8; }
        .section-title { font-weight: bold; font-size: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

        /* 캘린더 월 헤더 */
        .cal-month-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 14px; }
        .cal-month-nav span { font-size: 15px; font-weight: bold; }
        .cal-nav-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #555; padding: 4px 10px; border-radius: 6px; line-height: 1; }
        .cal-nav-btn:disabled { color: #ccc; cursor: default; }

        /* 요일 헤더 + 날짜 공통 그리드 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .cal-day-header { font-size: 12px; font-weight: bold; padding: 4px 0; color: #555; }
        .cal-day-header.sun { color: #e05; }
        .cal-day-header.sat { color: #55a; }

        .cal-date { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; border-radius: 8px; border: 1px solid #eee; }
        .cal-date.sun { color: #e05; }
        .cal-date.sat { color: #55a; }
        .cal-date.selected { background: #fee500; border-color: #fee500; font-weight: bold; color: #191919; }
        .cal-date.today { border: 2px solid #ff6b00; color: #ff6b00; font-weight: bold; }
        .cal-date.today.selected { background: #fee500; border-color: #fee500; color: #191919; }
        .cal-date.past { color: #ccc !important; cursor: default; background: #fafafa; border-color: transparent; }
        .cal-date.empty { border: none; cursor: default; }

        /* 시간 선택 */
        .time-section { padding: 22px 18px; border-bottom: 8px solid #f8f8f8; display: none; }
        .time-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .time-chip {
            padding: 10px 18px;
            border: 1px solid #ddd;
            border-radius: 50px;
            font-size: 14px;
            cursor: pointer;
            background: #fff;
            color: #333;
            transition: all 0.15s ease;
        }
        .time-chip:hover { border-color: #bbb; background: #f9f9f9; }
        .time-chip.selected { background: #fee500; border-color: #fee500; font-weight: bold; color: #191919; }

        /* 인원 선택 */
        .people-section { padding: 22px 18px; border-bottom: 8px solid #f8f8f8; display: none; }
        .people-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f2f2f2; }
        .people-row:last-child { border-bottom: none; }
        .people-label { font-size: 15px; color: #191919; }
        .people-label small { display: block; font-size: 11px; color: #aaa; margin-top: 2px; }
        .people-counter { display: flex; align-items: center; gap: 16px; }
        .counter-btn {
            width: 32px; height: 32px;
            border: 1px solid #ddd; border-radius: 50%;
            background: #fff; font-size: 18px; line-height: 1;
            cursor: pointer; color: #555;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .counter-btn:disabled { color: #ccc; border-color: #eee; cursor: default; }
        .counter-btn:not(:disabled):hover { border-color: #aaa; background: #f5f5f5; }
        .counter-val { font-size: 16px; font-weight: bold; min-width: 20px; text-align: center; }

        /* 예약자 정보 입력 */
        .contact-section { padding: 22px 18px; border-bottom: 8px solid #f8f8f8; display: none; }
        .input-row { margin-bottom: 16px; }
        .input-row label { display: block; font-size: 13px; color: #666; font-weight: bold; margin-bottom: 7px; }
        .input-row input {
            width: 100%; padding: 13px 14px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 15px; box-sizing: border-box;
            outline: none; font-family: inherit;
        }
        .input-row input:focus { border-color: #f0c000; box-shadow: 0 0 0 3px rgba(254,229,0,0.2); }
        .input-required { color: #e05; margin-left: 2px; }

        /* 예약 완료 성공 화면 */
        .success-overlay {
            display: none; position: fixed; inset: 0; background: #fff;
            z-index: 200; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; padding: 40px;
        }
        .success-overlay.show { display: flex; }
        .success-icon { font-size: 60px; margin-bottom: 20px; }
        .success-title { font-size: 22px; font-weight: bold; margin-bottom: 12px; }
        .success-desc { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 32px; }
        .success-summary {
            background: #f8f8f8; border-radius: 12px; padding: 18px 22px;
            text-align: left; width: 100%; max-width: 360px;
            font-size: 13px; color: #444; line-height: 2; margin-bottom: 32px;
        }
        .btn-home { background: #fee500; border: none; padding: 16px 40px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* 탭 바 */
        .tab-bar { display: flex; border-bottom: 1px solid #eee; position: sticky; top: 53px; background: #fff; z-index: 90; }
        .tab-btn {
            flex: 1; padding: 14px 0; text-align: center;
            font-size: 14px; font-weight: bold; color: #aaa;
            border: none; background: none; cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn.active { color: #191919; border-bottom-color: #191919; }

        /* 탭 패널 */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* 장소정보 탭 */
        .location-section { padding: 22px 18px; }
        .location-row { display: flex; gap: 14px; padding: 13px 0; border-bottom: 1px solid #f2f2f2; align-items: flex-start; }
        .location-row:last-child { border-bottom: none; }
        .location-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
        .location-label { font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .location-value { font-size: 14px; color: #333; line-height: 1.5; }

        /* 후기 탭 */
        .review-empty { padding: 60px 20px; text-align: center; color: #bbb; font-size: 14px; }

        .footer { position: fixed; bottom: 0; width: 100%; max-width: 500px; padding: 16px; background: #fff; border-top: 1px solid #eee; box-sizing: border-box; z-index: 100; left: 50%; transform: translateX(-50%); }
        .btn-submit { width: 100%; background: #fee500; border: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-submit:disabled { background: #f2f2f2; color: #ccc; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <span onclick="handleBack()" style="cursor:pointer; font-size: 24px;">&lsaquo;</span>

    </div>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('reserve')">예약</button>

            <button class="tab-btn" onclick="switchTab('review')">후기</button>
        </div>

        <!-- 예약 탭 -->
        <div class="tab-panel active" id="tab-reserve">
            <div class="menu-list-section">
                <div class="section-title">🎁 예약 메뉴를 선택하세요</div>
                <div id="menu-container"></div>
            </div>
        </div>

        <!-- 장소정보 탭 -->
        <div class="tab-panel" id="tab-location">
            <div class="location-section" id="location-container"></div>
        </div>

        <!-- 후기 탭 -->
        <div class="tab-panel" id="tab-review">
            <div class="review-empty">아직 등록된 후기가 없습니다.</div>
        </div>
    </div>

    <div id="step-view" style="display:none;">
        <div class="top-img-container"><img id="step-menu-img" class="top-img"></div>
        <div class="section">
            <div id="selected-menu-name" style="font-weight: bold; color: #ff6b00; font-size: 17px; margin-bottom: 8px;"></div>
            <div id="selected-menu-desc" style="font-size: 13px; color: #666; margin-bottom: 20px; line-height: 1.4; white-space: pre-line;"></div>
            <div class="section-title">📅 날짜 선택</div>
            <div class="cal-month-nav">
                <button class="cal-nav-btn" id="cal-prev" onclick="changeMonth(-1)">‹</button>
                <span id="cal-month-label"></span>
                <button class="cal-nav-btn" id="cal-next" onclick="changeMonth(1)">›</button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>

        <div class="time-section" id="time-section">
            <div class="section-title">🕐 <span id="time-section-label">시간 선택</span></div>
            <div class="time-grid" id="time-grid"></div>
        </div>

        <div class="people-section" id="people-section">
            <div class="section-title">👤 인원 선택</div>
            <div class="people-row">
                <div class="people-label">성인<small>만 13세 이상</small></div>
                <div class="people-counter">
                    <button class="counter-btn" id="adult-minus" onclick="changeCount('adult',-1)" disabled>−</button>
                    <span class="counter-val" id="adult-val">0</span>
                    <button class="counter-btn" id="adult-plus" onclick="changeCount('adult',1)">+</button>
                </div>
            </div>
            <div class="people-row">
                <div class="people-label">아동<small>만 4세 ~ 12세</small></div>
                <div class="people-counter">
                    <button class="counter-btn" id="child-minus" onclick="changeCount('child',-1)" disabled>−</button>
                    <span class="counter-val" id="child-val">0</span>
                    <button class="counter-btn" id="child-plus" onclick="changeCount('child',1)">+</button>
                </div>
            </div>
            <div class="people-row">
                <div class="people-label">유아<small>만 3세 이하</small></div>
                <div class="people-counter">
                    <button class="counter-btn" id="infant-minus" onclick="changeCount('infant',-1)" disabled>−</button>
                    <span class="counter-val" id="infant-val">0</span>
                    <button class="counter-btn" id="infant-plus" onclick="changeCount('infant',1)">+</button>
                </div>
            </div>
        </div>

        <div class="contact-section" id="contact-section">
            <div class="section-title">✏️ 예약자 정보</div>
            <div class="input-row">
                <label>이름 <span class="input-required">*</span></label>
                <input type="text" id="input-name" placeholder="예약자 이름을 입력하세요">
            </div>
            <div class="input-row">
                <label>연락처 <span class="input-required">*</span></label>
                <input type="tel" id="input-phone" placeholder="010-0000-0000">
            </div>
            <div class="input-row">
                <label>이메일</label>
                <input type="email" id="input-email" placeholder="example@email.com">
            </div>
        </div>
    </div>

    <div class="footer" id="footer-bar" style="display:none;">
        <button id="submit-btn" class="btn-submit" disabled onclick="submitReservation()">예약 완료</button>
    </div>
</div>

<!-- 예약 완료 성공 화면 -->

                {
                    title: "옵션 3: GOLDEN VIEW 스페셜 세트 · 종일 (100유로)",
                    img: "골든뷰_예약3.png",
                    desc: "GOLDEN VIEW 스페셜 세트 (종일)\n2인기준 100유로 · 정상가 대비 35% 할인\n\n1. 해산물 샐러드 (문어 · 오징어)\n2. 봉골레 파스타 (2접시로 쉐어)\n3. 오늘의 생선 800g 전후\n    그릴 또는 소금구이 선택\n4. 음료 2종 선택\n    프로세코 · 화이트와인 · 탄산음료 중 택2\n5. 물"
                }
            ]
        }
    };

    // URL 파라미터에서 매장 id 읽기
    const params = new URLSearchParams(window.location.search);
    const storeId = params.get('id') || 'dal_duomo';
    const store = storeData[storeId] || storeData['dal_duomo'];

    // 탭 전환
    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach((btn, i) => {
            const names = ['reserve', 'location', 'review'];
            btn.classList.toggle('active', names[i] === tabName);
        });
        document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
        document.getElementById(`tab-${tabName}`).classList.add('active');
    }

    window.onload = () => {
        // 헤더 타이틀 + 매장 정보 세팅
        document.getElementById('nav-title').innerText = store.name;
        document.getElementById('store-name-title').innerText = store.name;
        document.getElementById('main-img').src = store.img;

        // 장소정보 탭 렌더링
        const loc = store.location;
        if (loc) {
            const rows = [
                { icon: '📍', label: '주소', value: loc.address },
                { icon: '🕐', label: '영업시간', value: loc.hours },
                { icon: '📞', label: '전화번호', value: loc.tel },
                { icon: '💬', label: '소개', value: loc.note }
            ];
            const locContainer = document.getElementById('location-container');
            rows.forEach(row => {
                locContainer.innerHTML += `
                    <div class="location-row">
                        <div class="location-icon">${row.icon}</div>
                        <div>
                            <div class="location-label">${row.label}</div>
                            <div class="location-value">${row.value.replace(/\n/g, '<br>')}</div>
                        </div>
                    </div>`;
            });
        }

        // 메뉴 카드 생성
        const container = document.getElementById('menu-container');
        if (store.menus.length === 0) {
            container.innerHTML = '<p style="color:#aaa; text-align:center; padding:20px;">준비 중입니다.</p>';
            return;
        }
        store.menus.forEach(m => {
            const card = document.createElement('div');
            card.className = 'menu-card';
            card.innerHTML = `
                <img src="${m.img}" class="menu-card-img">
                <div class="menu-content">
                    <div class="menu-title">${m.title}</div>
                    <div class="menu-desc">${m.desc}</div>
                    <button class="btn-select-menu">예약하기</button>
                </div>`;
            card.querySelector('.btn-select-menu').addEventListener('click', () => {
                startBooking(m.title, m.img, m.desc);
            });
            container.appendChild(card);
        });
    };

    function startBooking(title, img, desc) {
        selectedMenuTitle = title;
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('step-view').style.display = 'block';
        document.getElementById('footer-bar').style.display = 'block';
        document.getElementById('step-menu-img').src = img;
        document.getElementById('selected-menu-name').innerText = title;
        document.getElementById('selected-menu-desc').innerText = desc;
        initCalendar();
    }

    // 현재 캘린더가 보여주는 연/월
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    let calYear = today.getFullYear();
    let calMonth = today.getMonth(); // 0-indexed

    function changeMonth(delta) {
        const minYear = today.getFullYear();
        const minMonth = today.getMonth();
        const next = new Date(calYear, calMonth + delta, 1);
        // 현재 달보다 이전으로는 이동 불가
        if (next.getFullYear() < minYear || (next.getFullYear() === minYear && next.getMonth() < minMonth)) return;
        calYear = next.getFullYear();
        calMonth = next.getMonth();
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';

        // 월 레이블 업데이트
        document.getElementById('cal-month-label').innerText =
            `${calYear}년 ${calMonth + 1}월`;

        // 이전 달 버튼 비활성화 (현재 달이면 비활성)
        const prevBtn = document.getElementById('cal-prev');
        const isCurrentMonth = calYear === today.getFullYear() && calMonth === today.getMonth();
        prevBtn.disabled = isCurrentMonth;

        // 요일 헤더 (일~토)
        const dayLabels = ['일', '월', '화', '수', '목', '금', '토'];
        const dayClasses = ['sun', '', '', '', '', '', 'sat'];
        dayLabels.forEach((label, i) => {
            const h = document.createElement('div');
            h.className = 'cal-day-header' + (dayClasses[i] ? ' ' + dayClasses[i] : '');
            h.innerText = label;
            grid.appendChild(h);
        });

        // 해당 월의 1일 요일(0=일) 만큼 빈 칸 채우기
        const firstDay = new Date(calYear, calMonth, 1).getDay();
        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            empty.className = 'cal-date empty';
            grid.appendChild(empty);
        }

        // 날짜 채우기
        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        for (let day = 1; day <= daysInMonth; day++) {
            const cellDate = new Date(calYear, calMonth, day);
            const dayOfWeek = cellDate.getDay(); // 0=일, 6=토
            const isPast = cellDate < today;
            const isToday = cellDate.getTime() === today.getTime();

            const d = document.createElement('div');
            let cls = 'cal-date';
            if (dayOfWeek === 0) cls += ' sun';
            if (dayOfWeek === 6) cls += ' sat';
            if (isToday) cls += ' today';
            if (isPast) cls += ' past';
            d.className = cls;
            d.innerText = day;

            if (!isPast) {
                d.addEventListener('click', () => {
                    document.querySelectorAll('.cal-date').forEach(el => el.classList.remove('selected'));
                    d.classList.add('selected');
                    selectedDay = day;
                    resetTimeSelection();
                    showTimeSection();
                });
            }
            grid.appendChild(d);
        }
    }

    function initCalendar() {
        calYear = today.getFullYear();
        calMonth = today.getMonth();
        selectedDay = null;
        resetTimeSelection();
        resetPeopleSection();
        document.getElementById('time-section').style.display = 'none';
        document.getElementById('people-section').style.display = 'none';
        document.getElementById('contact-section').style.display = 'none';
        document.getElementById('submit-btn').disabled = true;
        renderCalendar();
    }

    // 시간 선택 초기화
    function resetTimeSelection() {
        document.querySelectorAll('.time-chip').forEach(el => el.classList.remove('selected'));
        document.getElementById('time-section-label').innerText = '시간 선택';
        // 인원 섹션도 함께 숨김
        resetPeopleSection();
        document.getElementById('people-section').style.display = 'none';
        document.getElementById('submit-btn').disabled = true;
    }

    // 시간 선택 영역 생성 & 표시
    function showTimeSection() {
        const section = document.getElementById('time-section');
        const grid = document.getElementById('time-grid');

        // 이미 칩이 있으면 새로 그리지 않음
        if (grid.children.length === 0) {
            const slots = [];
            for (let h = 12; h <= 22; h++) {
                slots.push(`${String(h).padStart(2,'0')}:00`);
                if (h < 22) slots.push(`${String(h).padStart(2,'0')}:30`);
            }
            slots.forEach(time => {
                const chip = document.createElement('button');
                chip.className = 'time-chip';
                chip.innerText = time;
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.time-chip').forEach(el => el.classList.remove('selected'));
                    chip.classList.add('selected');
                    document.getElementById('time-section-label').innerText = time;
                    // 시간 선택 시 인원 섹션 열기
                    resetPeopleSection();
                    showPeopleSection();
                });
                grid.appendChild(chip);
            });
        }

        section.style.display = 'block';
        setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    }

    // 인원 카운터 상태
    const counts = { adult: 0, child: 0, infant: 0 };
    let selectedDay = null;
    let selectedMenuTitle = '';

    function resetPeopleSection() {
        counts.adult = 0; counts.child = 0; counts.infant = 0;
        ['adult', 'child', 'infant'].forEach(type => {
            document.getElementById(`${type}-val`).innerText = '0';
            document.getElementById(`${type}-minus`).disabled = true;
        });
        document.getElementById('contact-section').style.display = 'none';
        document.getElementById('submit-btn').disabled = true;
    }

    function showPeopleSection() {
        const section = document.getElementById('people-section');
        section.style.display = 'block';
        setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    }

    function changeCount(type, delta) {
        counts[type] = Math.max(0, counts[type] + delta);
        document.getElementById(`${type}-val`).innerText = counts[type];
        document.getElementById(`${type}-minus`).disabled = counts[type] === 0;

        const total = counts.adult + counts.child + counts.infant;

        // 1명 이상이면 예약자 정보 섹션 표시
        const contactSection = document.getElementById('contact-section');
        if (total >= 1 && contactSection.style.display === 'none') {
            contactSection.style.display = 'block';
            setTimeout(() => contactSection.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
        } else if (total === 0) {
            contactSection.style.display = 'none';
        }

        document.getElementById('submit-btn').disabled = total === 0;
    }

    // Google Apps Script 웹앱 URL (배포 후 교체)
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwrtrUS4bhp_p9hsEegXwrI68x7ZvShFDVF8eRK_bCanxp9s1dCCUcPwbOJP1A4YlKV/exec';

    function submitReservation() {
        const name = document.getElementById('input-name').value.trim();
        const phone = document.getElementById('input-phone').value.trim();
        const email = document.getElementById('input-email').value.trim();

        if (!name) { alert('이름을 입력해 주세요.'); document.getElementById('input-name').focus(); return; }
        if (!phone) { alert('연락처를 입력해 주세요.'); document.getElementById('input-phone').focus(); return; }

        const dateStr = selectedDay ? `${calYear}년 ${calMonth + 1}월 ${selectedDay}일` : '-';
        const timeStr = document.getElementById('time-section-label').innerText;

        const data = {
            store: store.name,
            menu: selectedMenuTitle,
            date: dateStr,
            time: timeStr,
            adult: counts.adult,
            child: counts.child,
            infant: counts.infant,
            name,
            phone,
            email
        };

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = '접수 중...';

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => showSuccess(data))
        .catch(() => showSuccess(data)); // no-cors는 항상 opaque response

    }

    function showSuccess(data) {
        document.getElementById('success-summary').innerHTML = `
            <b>매장</b>: ${data.store}<br>
            <b>메뉴</b>: ${data.menu}<br>
            <b>날짜</b>: ${data.date}<br>
            <b>시간</b>: ${data.time}<br>
            <b>인원</b>: 성인 ${data.adult}명 / 아동 ${data.child}명 / 유아 ${data.infant}명<br>
            <b>예약자</b>: ${data.name} (${data.phone})
        `;
        document.getElementById('success-overlay').classList.add('show');
    }

    function handleBack() {
        if (document.getElementById('step-view').style.display === 'block') {
            document.getElementById('step-view').style.display = 'none';
            document.getElementById('footer-bar').style.display = 'none';
            document.getElementById('menu-view').style.display = 'block';
        } else {
            history.back();
        }
    }
</script>
</body>
</html>
