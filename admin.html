<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 - 피렌체 크리스</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #f2f2f2; font-family: -apple-system, sans-serif; color: #191919; padding-bottom: 40px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }

        /* 헤더 */
        .header { padding: 16px 18px; background: #191919; color: #fff; text-align: center; position: sticky; top: 0; z-index: 10; }
        .header h1 { margin: 0; font-size: 17px; font-weight: bold; }

        /* 로그인 */
        #login-screen { padding: 70px 30px; text-align: center; }
        #login-screen h2 { font-size: 20px; margin-bottom: 8px; }
        #login-screen p { font-size: 13px; color: #aaa; margin-bottom: 28px; }
        #pw-input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 20px; text-align: center; letter-spacing: 8px; margin-bottom: 14px; outline: none; }
        #pw-input:focus { border-color: #191919; }
        #login-btn { width: 100%; padding: 15px; background: #fee500; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .login-error { color: #e05; font-size: 13px; margin-top: 12px; display: none; }

        /* 탭 */
        .tab-bar { display: flex; border-bottom: 1px solid #eee; position: sticky; top: 49px; background: #fff; z-index: 9; }
        .tab-btn { flex: 1; padding: 13px 2px; text-align: center; font-size: 12px; font-weight: bold; color: #aaa; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; line-height: 1.4; }
        .tab-btn.active { color: #191919; border-bottom-color: #191919; }
        .tab-panel { display: none; padding: 22px 18px; }
        .tab-panel.active { display: block; }
        .section-title { font-size: 15px; font-weight: bold; margin-bottom: 6px; }
        .section-desc { font-size: 12px; color: #aaa; margin-bottom: 18px; }

        /* 식당 선택 */
        .store-select { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; margin-bottom: 18px; outline: none; -webkit-appearance: auto; }

        /* 달력 */
        .cal-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 12px; }
        .cal-nav-label { font-size: 15px; font-weight: bold; }
        .cal-nav-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #555; line-height: 1; padding: 4px 8px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .cal-day-h { font-size: 11px; font-weight: bold; padding: 4px 0; color: #555; }
        .cal-day-h.sun { color: #e05; }
        .cal-day-h.sat { color: #55a; }
        .cal-date { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; border-radius: 6px; border: 1px solid #eee; transition: background 0.1s; user-select: none; }
        .cal-date:hover { background: #f0f0f0; }
        .cal-date.sun { color: #e05; }
        .cal-date.sat { color: #55a; }
        .cal-date.empty { border: none; cursor: default; }
        .cal-date.empty:hover { background: transparent; }
        .cal-date.blocked { background: #ffebee; border-color: #ef9a9a; color: #c62828 !important; font-weight: bold; }
        .cal-date.blocked:hover { background: #ffcdd2; }
        .cal-legend { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #777; margin-top: 12px; }
        .legend-box { width: 14px; height: 14px; background: #ffebee; border: 1px solid #ef9a9a; border-radius: 3px; flex-shrink: 0; }

        /* 예약 가능 기간 */
        .days-row { display: flex; align-items: center; gap: 12px; padding: 18px 0; }
        .days-label { font-size: 15px; color: #333; }
        .days-input { width: 68px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 22px; font-weight: bold; text-align: center; outline: none; }
        .days-input:focus { border-color: #191919; }

        /* 공지 설정 */
        .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f2f2f2; margin-bottom: 18px; }
        .toggle-label { font-size: 15px; font-weight: bold; }
        .toggle { position: relative; display: inline-block; width: 50px; height: 28px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 28px; transition: 0.3s; }
        .toggle-slider::before { content: ''; position: absolute; width: 22px; height: 22px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
        .toggle input:checked + .toggle-slider { background: #191919; }
        .toggle input:checked + .toggle-slider::before { transform: translateX(22px); }
        .field-label { font-size: 13px; color: #666; font-weight: bold; margin-bottom: 8px; }
        .notice-textarea { width: 100%; height: 140px; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; outline: none; line-height: 1.7; }
        .notice-textarea:focus { border-color: #191919; }

        /* 저장 버튼 */
        .save-btn { width: 100%; padding: 15px; background: #191919; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 22px; }
        .save-btn:active { opacity: 0.75; }

        /* 토스트 */
        .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #191919; color: #fff; padding: 12px 26px; border-radius: 24px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
        .toast.show { opacity: 1; }

        /* 로딩 */
        .loading { text-align: center; color: #bbb; font-size: 14px; padding: 30px 0; grid-column: 1 / -1; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔧 피렌체 크리스 관리자</h1>
    </div>

    <!-- 로그인 화면 -->
    <div id="login-screen">
        <h2>관리자 로그인</h2>
        <p>관리자 전용 페이지입니다.</p>
        <input type="password" id="pw-input" placeholder="••••••"
               onkeydown="if(event.key==='Enter') login()">
        <button id="login-btn" onclick="login()">로그인</button>
        <div class="login-error" id="login-error">비밀번호가 올바르지 않습니다.</div>
    </div>

    <!-- 관리 패널 -->
    <div id="admin-panel" style="display:none;">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('blocked')">예약 불가<br>날짜</button>
            <button class="tab-btn" onclick="switchTab('period')">예약 가능<br>기간</button>
            <button class="tab-btn" onclick="switchTab('notice')">공지<br>설정</button>
        </div>

        <!-- 탭1: 예약 불가 날짜 -->
        <div class="tab-panel active" id="tab-blocked">
            <div class="section-title">예약 불가 날짜 관리</div>
            <div class="section-desc">날짜를 클릭하면 예약 불가/가능이 토글됩니다.</div>
            <select class="store-select" id="store-select" onchange="renderCalendar()">
                <option value="all">전체 공통 (모든 식당)</option>
                <option value="dal_station">달오스떼 역앞점</option>
                <option value="dal_duomo">달오스떼 두오모점</option>
                <option value="nuti">누띠 (Nuti)</option>
                <option value="paoli">파올리 (Paoli)</option>
                <option value="golden_view">골든뷰 (Golden View)</option>
            </select>
            <div class="cal-nav">
                <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
                <span class="cal-nav-label" id="cal-label"></span>
                <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
            <div class="cal-legend"><div class="legend-box"></div> 예약 불가 날짜</div>
            <button class="save-btn" onclick="saveBlockedDates()">저장</button>
        </div>

        <!-- 탭2: 예약 가능 기간 -->
        <div class="tab-panel" id="tab-period">
            <div class="section-title">예약 가능 기간 설정</div>
            <div class="section-desc">오늘 포함 기준 · 최소 1일 · 최대 90일</div>
            <div class="days-row">
                <span class="days-label">오늘부터</span>
                <input type="number" class="days-input" id="booking-days" min="1" max="90" value="7">
                <span class="days-label">일까지 예약 가능</span>
            </div>
            <button class="save-btn" onclick="saveBookingDays()">저장</button>
        </div>

        <!-- 탭3: 공지 설정 -->
        <div class="tab-panel" id="tab-notice">
            <div class="section-title">공지 팝업 설정</div>
            <div class="toggle-row">
                <span class="toggle-label">공지 팝업 표시</span>
                <label class="toggle">
                    <input type="checkbox" id="notice-enabled">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="field-label">공지 내용</div>
            <textarea class="notice-textarea" id="notice-text"
                placeholder="예약자에게 전달할 공지 내용을 입력하세요.&#10;예) 5월 10일은 전 식당 휴무입니다."></textarea>
            <button class="save-btn" onclick="saveNotice()">저장</button>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzsj2Bpx3WRhuKTBaEgOI6hTGrdxoXIgmMr5JZ9fnSiWQal6nGx6wnAgc9pbW_TQcc/exec';
    const PASSWORD = '12345';

    let settings = { blocked_dates: {}, booking_days: 7, notice_enabled: false, notice_text: '' };
    let calYear = new Date().getFullYear();
    let calMonth = new Date().getMonth();

    /* ── 로그인 ── */
    function login() {
        if (document.getElementById('pw-input').value === PASSWORD) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            loadSettings();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    /* ── 설정 불러오기 ── */
    function loadSettings() {
        document.getElementById('cal-grid').innerHTML = '<div class="loading">설정 불러오는 중...</div>';
        fetch(SCRIPT_URL)
            .then(r => r.json())
            .then(data => {
                settings.booking_days    = parseInt(data.booking_days) || 7;
                settings.blocked_dates   = JSON.parse(data.blocked_dates || '{}');
                settings.notice_enabled  = data.notice_enabled === 'true';
                settings.notice_text     = data.notice_text || '';
                document.getElementById('booking-days').value       = settings.booking_days;
                document.getElementById('notice-enabled').checked   = settings.notice_enabled;
                document.getElementById('notice-text').value        = settings.notice_text;
                renderCalendar();
            })
            .catch(() => {
                showToast('설정을 불러오지 못했습니다. 기본값으로 시작합니다.');
                renderCalendar();
            });
    }

    /* ── 탭 전환 ── */
    function switchTab(name) {
        const names = ['blocked', 'period', 'notice'];
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', names[i] === name));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
    }

    /* ── 달력 ── */
    function changeMonth(delta) {
        const n = new Date(calYear, calMonth + delta, 1);
        calYear = n.getFullYear();
        calMonth = n.getMonth();
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('cal-grid');
        grid.innerHTML = '';
        document.getElementById('cal-label').innerText = `${calYear}년 ${calMonth + 1}월`;

        const storeId    = document.getElementById('store-select').value;
        const blockedSet = new Set(settings.blocked_dates[storeId] || []);

        const dayLabels  = ['일', '월', '화', '수', '목', '금', '토'];
        const dayClasses = ['sun', '', '', '', '', '', 'sat'];
        dayLabels.forEach((l, i) => {
            const h = document.createElement('div');
            h.className = 'cal-day-h' + (dayClasses[i] ? ' ' + dayClasses[i] : '');
            h.innerText = l;
            grid.appendChild(h);
        });

        const firstDay = new Date(calYear, calMonth, 1).getDay();
        for (let i = 0; i < firstDay; i++) {
            const e = document.createElement('div');
            e.className = 'cal-date empty';
            grid.appendChild(e);
        }

        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const dow     = new Date(calYear, calMonth, day).getDay();
            const blocked = blockedSet.has(dateStr);

            const d = document.createElement('div');
            d.className = 'cal-date' + (dayClasses[dow] ? ' ' + dayClasses[dow] : '') + (blocked ? ' blocked' : '');
            d.innerText = day;
            d.addEventListener('click', () => {
                if (!settings.blocked_dates[storeId]) settings.blocked_dates[storeId] = [];
                const arr = settings.blocked_dates[storeId];
                const idx = arr.indexOf(dateStr);
                if (idx >= 0) arr.splice(idx, 1); else arr.push(dateStr);
                renderCalendar();
            });
            grid.appendChild(d);
        }
    }

    /* ── 저장 ── */
    function saveBlockedDates() {
        postSettings({ blocked_dates: JSON.stringify(settings.blocked_dates) });
    }

    function saveBookingDays() {
        const days = parseInt(document.getElementById('booking-days').value);
        if (!days || days < 1) { alert('1 이상의 숫자를 입력하세요.'); return; }
        settings.booking_days = days;
        postSettings({ booking_days: String(days) });
    }

    function saveNotice() {
        const enabled = document.getElementById('notice-enabled').checked;
        const text    = document.getElementById('notice-text').value.trim();
        settings.notice_enabled = enabled;
        settings.notice_text    = text;
        postSettings({ notice_enabled: String(enabled), notice_text: text });
    }

    function postSettings(partial) {
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'saveSettings', settings: partial })
        });
        showToast('저장되었습니다 ✓');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }
</script>
</body>
</html>
